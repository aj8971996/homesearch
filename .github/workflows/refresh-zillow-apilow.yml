name: Refresh Listings — Zillow Backup (APIllow)

on:
  schedule:
    # 1st of each month at 10:00 UTC. With ~10 calls/run (100 items), one scheduled
    # run uses ~10 of the 50 monthly calls, leaving ~40 for manual re-triggers.
    - cron: '0 10 1 * *'
  workflow_dispatch:

jobs:
  etl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt

      - name: Install dependencies
        run: pip install -r etl/requirements.txt

      - name: Verify API key is set
        run: |
          if [ -z "$RAPIDAPI_KEY_APILOW" ]; then
            echo "ERROR: RAPIDAPI_KEY_APILOW secret is not set or is empty"
            exit 1
          fi
          echo "API key is present (length: ${#RAPIDAPI_KEY_APILOW})"
        env:
          RAPIDAPI_KEY_APILOW: ${{ secrets.RAPIDAPI_KEY_APILOW }}

      - name: Run Zillow APIllow ETL
        env:
          RAPIDAPI_KEY_APILOW: ${{ secrets.RAPIDAPI_KEY_APILOW }}
        run: python etl/scrape_zillow_apilow.py

      - name: Commit updated data
        run: |
          git config user.name  "homesearch-bot"
          git config user.email "bot@homesearch.local"
          git add public/data/listings.json public/data/meta.json public/data/photos/
          git diff --cached --quiet \
            && echo "No listing changes this run — nothing to commit." \
            || git commit -m "data: refresh listings (zillow-apilow) $(date -u +%Y-%m-%d)"
          git push

      - name: Trigger Pages rebuild
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy-pages.yml/dispatches \
            -d '{"ref":"main"}'
